name: Run tests

on: 
  push:
    branches:
    - master
    - main
  
jobs:  
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 23, 24]

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
    - run: npm ci && npm test
